<!DOCTYPE html>

    <head>
        <title>Advertise Job</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    </head>
    <body>
        <form>
            <fieldset>
                <p>
            <label for = "jobPost">Name of Job</label>
            <input type = "text" id = "job" name = "nameJob" placeholder = "E.g. Develop an e-commerce website">
            </p>

            <p>
            <label for = "jobDescription">Job Description</label>
            <textarea id="summary" name="summary" class="textarea-sm" placeholder="Describe the job's scope, goals, and deliverables..."></textarea>
            </p>
            <p>
            <label for = "jobCategory"></label>
            <select id = "gigCategory" name = "categoryGig" required>
                <option value = "">Select category of job</option>
                <option value = "technology">Programming and Tech</option>
                <option value = "data">Data</option>
                <option value = "business">Business</option>
                <option value = "consulting">Consulting</option>
                <option value = "marketing">Marketing and Sales</option>
                <option value = "finance">Finance and Accounting</option>
            </select>
            </p>
             <p>
            <label for = "jobType"></label>
            <select id = "typeOfJob" name = "categoryGig" required>
                <option value = "">Please select one</option>
                <option value = "remote">Remote</option>
                <option value = "inPerson">In Person</option>
                <option value = "hybrid">Hybrid</option>
            </select>
            </p>
            <p>
            <label for = "jobDuration">Job Duration</label>
            <!--<input id = "duration" name = "timeLength"> -->
            <select id = "duration" name = "timeLength">
                <option value = "">Select time unit</option>
                <option value = "days">Days</option>
                <option value = "weeks">Weeks</option>
                <option value = "months">Months</option>
                <p>Enter duration and specify the unit of time </p>
            </select>
            </p>
            <p>
                <label for = "gigDuration">Job Duration</label>
                <input type = "number" id = "jobLength" name = "lengthOfJob" required>
            </p>
            <p>
            <label for = "currency"></label>
            <select id = "currency" name = "currency" required>
                <option value = "USD">USD</option>
            </select>
            </p>
            <p>
                <input type="radio" id="projectContract" name="contractType" value="Per Project" required>
                <label for="projectContract">Pay per Project</label>

                <input type="radio" id="hourlyContract" name="contractType" value="Hourly">
                <label for="hourlyContract">Pay per hour</label>

                <input type="radio" id="customContract" name="contractType" value="Custom Offer">
                <label for="customContract">Custom Contract</label>
            </p>
            <p>
            <label for = "payment">Job's pay</label>
            <input type = "number" id = "pay" name = "pay" min = "0" step = "1" required>
            <p>
            <small>Enter value in smallest monetary unit
                Note: Value is by default in United States Dollar($).
            </small>
            </p>
            </p>
        </fieldset>
        </form>
        <button type="button" id="postJob" onclick="myClick()">Post Job Test</button>
        <button type="button" id="postJob" >Post Job</button>

        const payInput = document.querySelector('#pay');
        payInput?.addEventListener('input', (e) => {
          e.target.value = e.target.value.replace(/[^\d]/g, '');
        });
        </script>
