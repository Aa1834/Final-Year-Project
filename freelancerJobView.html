<!DOCTYPE html>
<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <style>
        #jobsTable {
            width: 100%;
            border-collapse: separate;
            border-spacing: 8px 6px; /* horizontal vertical */
        }

        #jobsTable th,
        #jobsTable td {
            padding: 5px 9px;
            text-align: left;
            background: #fff;
        }
</style>
    </head>
    <body>
        <select id = "job-category">
            <option value = "all">Show All Jobs</option>
            <option value = "business">Business</option>
            <option value = "technology">Technology</option>
            <option value = "finance">Finance</option>
            <option value = "marketing">Marketing</option>
            <option value = "consulting">Consulting</option>
            <option value = "data">Data</option>
        </select>
        
        <table id="jobsTable" class="table table-striped table-hover">
            <thead>
                <tr>
                    <th>Job Title</th>
                    <th>Payment</th>
                    <th>Duration</th>
                    <th>Date of job assigment</th>
                    <th>Job Category</th>
                    <th>Go to job</th>
                </tr>
            </thead>
            <tbody id="jobsTableBody"></tbody>
        </table>
        <p id="jobsStatus"></p>
        <script type="module" src="freelancerJobView.js"></script>
    </body>
</html>
