<!DOCTYPE html>
<html>
  <head>
    <title>Bid for Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  </head>
  <body>
    <div class="container py-4">
      <h2 class="mb-3">Bid for Job</h2>

      <div class="card mb-4">
        <div class="card-body">
          <h5 class="card-title" id="jobTitle">Title</h5>
          <p class="card-text" id="jobDescription"></p>
          <p class="card-text" id="jobLength"></p>
          <p class="card-text" id="jobPayment"></p>
          <p class="card-text" id="jobContract"></p>
        </div>
      </div>

      <form id="bidForm">
        <div class = "mb-3">
          <label for = "Upload resume"></label>
          <input type = "file" id = "resume" name = "resume" accept = "application/pdf">
          <button id ="uploadResume">Upload your resume</button>
        </div>
        <div class="mb-3">
          <label class="form-label">Your bid amount ($)</label>
          <input type="number" class="form-control" id="bidAmount" min="1" step="0.01" placeholder="$" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Why are you the best fit?</label>
          <textarea class="form-control" id="bidStatement" rows="4" placeholder="Write your statement" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Submit Bid</button>
        <div id="bidStatus" class="mt-2"></div>
      </form>
    </div>

    <script type="module" src="jobBid.js" defer></script>
  </body>
</html>
